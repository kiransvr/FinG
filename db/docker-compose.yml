version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: fing-postgres
    environment:
      POSTGRES_DB: fing
      POSTGRES_USER: fing
      POSTGRES_PASSWORD: fing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
